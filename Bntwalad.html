<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنت ولد - Pro Version</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --danger: #f43f5e; --success: #10b981; --bg: #0f172a; }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Glassmorphism Card */
        .container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 32px; width: 95%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        .hidden { display: none !important; }

        h1 { font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Inputs & Buttons */
        input[type="text"] { width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: white; font-family: inherit; font-size: 1rem; outline: none; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }

        /* Game UI */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .letter-circle { width: 75px; height: 75px; background: linear-gradient(135deg, var(--primary), #4338ca); border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 2.8rem; font-weight: 900; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field-box { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; }
        .field-box label { display: block; font-size: 0.75rem; color: #94a3b8; font-weight: 700; margin-bottom: 4px; }
        .field-box input { background: transparent; border: none; padding: 0; margin: 0; font-size: 1.1rem; }

        /* Picker */
        .alphabet-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .l-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 0; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .l-btn:hover { background: var(--primary); }

        /* Chat */
        .chat-area { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        #chat-box { height: 70px; overflow-y: auto; font-size: 0.85rem; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <div id="sc-join">
        <h1>بنت ولد</h1>
        <input type="text" id="nick" placeholder="أدخل اسمك المستعار...">
        <button class="btn btn-primary" onclick="join()">انضم الآن ➔</button>
    </div>

    <div id="sc-lobby" class="hidden">
        <h2 style="text-align:center">غرفة الانتظار</h2>
        <div id="p-list" style="margin: 20px 0"></div>
        <button id="ready-btn" class="btn btn-primary" onclick="ready()">أنا جاهز (Ready)</button>
    </div>

    <div id="sc-picker" class="hidden">
        <h2 id="p-info" style="text-align:center">اختيار الحرف</h2>
        <div id="p-timer" style="font-size: 3.5rem; font-weight: 900; text-align:center; color: var(--danger)">5</div>
        <div id="l-grid-container" class="hidden">
            <div class="alphabet-grid" id="alphabet-grid"></div>
        </div>
    </div>

    <div id="sc-game" class="hidden">
        <div class="game-header">
            <div class="letter-circle" id="active-l">؟</div>
            <div id="timer" style="font-size: 1.8rem; font-weight: 700;">60</div>
        </div>
        <div class="grid-inputs">
            <div class="field-box"><label>بنت</label><input type="text" class="ans"></div>
            <div class="field-box"><label>ولد</label><input type="text" class="ans"></div>
            <div class="field-box"><label>حيوان</label><input type="text" class="ans"></div>
            <div class="field-box"><label>نبات</label><input type="text" class="ans"></div>
            <div class="field-box"><label>جماد</label><input type="text" class="ans"></div>
            <div class="field-box"><label>بلاد</label><input type="text" class="ans"></div>
        </div>
        <button class="btn btn-primary" style="background: var(--danger); margin-top: 20px;" onclick="stopRound()">S T O P !</button>
    </div>

    <div class="chat-area">
        <div id="chat-box"></div>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
            <input type="text" id="m-in" placeholder="نبر هنا..." style="margin:0; padding:8px;">
            <button class="btn btn-primary" style="width: auto; padding: 0 15px;" onclick="sendMsg()">></button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentLetter = "";
    let amIPicker = false;

    function join() {
        const n = document.getElementById('nick').value;
        if(n.trim()) { socket.emit('join_game', n); show('sc-lobby'); }
    }

    function ready() {
        socket.emit('player_ready');
        document.getElementById('ready-btn').disabled = true;
        document.getElementById('ready-btn').style.opacity = "0.5";
    }

    socket.on('update_players', (ps) => {
        document.getElementById('p-list').innerHTML = Object.values(ps).map(p => `
            <div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:5px;">
                <span>${p.name} ${p.ready ? '✅' : '⏳'}</span>
                <span style="font-weight:700">${p.score} نقطة</span>
            </div>
        `).join('');
    });

    socket.on('picker_selected', (data) => {
        show('sc-picker');
        let count = 5;
        const t = document.getElementById('p-timer');
        if(socket.id === data.pickerId) {
            amIPicker = true;
            document.getElementById('p-info').innerText = "دورك! اختر حرفاً";
            document.getElementById('l-grid-container').classList.remove('hidden');
            const grid = document.getElementById('alphabet-grid');
            grid.innerHTML = data.remaining.split('').map(l => `<button class="l-btn" onclick="pick('${l}')">${l}</button>`).join('');
        } else {
            document.getElementById('p-info').innerText = `ينتظرون ${data.pickerName}...`;
            document.getElementById('l-grid-container').classList.add('hidden');
        }
        let itv = setInterval(() => {
            count--; t.innerText = count;
            if(count <= 0) { clearInterval(itv); if(amIPicker) pick('أ'); }
        }, 1000);
    });

    function pick(l) { if(amIPicker) { socket.emit('letter_chosen', l); amIPicker = false; } }

    socket.on('start_game', (l) => {
        currentLetter = l;
        document.getElementById('active-l').innerText = l;
        show('sc-game');
        document.querySelectorAll('.ans').forEach(i => { i.value = ""; i.disabled = false; });
    });

    function stopRound() {
        let sc = 0;
        document.querySelectorAll('.ans').forEach(i => {
            if(i.value.trim().startsWith(currentLetter) && i.value.length > 1) sc++;
        });
        socket.emit('submit_round', { roundScore: sc });
    }

    socket.on('round_ended', (data) => {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        alert("انتهت الجولة! الموقف: " + data.stopper);
        show('sc-lobby');
        document.getElementById('ready-btn').disabled = false;
        document.getElementById('ready-btn').style.opacity = "1";
    });

    function sendMsg() {
        const i = document.getElementById('m-in');
        if(i.value) { socket.emit('send_msg', i.value); i.value = ""; }
    }

    socket.on('msg', (d) => {
        const b = document.getElementById('chat-box');
        b.innerHTML += `<div><b>${d.name}:</b> ${d.txt}</div>`;
        b.scrollTop = b.scrollHeight;
    });

    function show(id) {
        ['sc-join', 'sc-lobby', 'sc-picker', 'sc-game'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
